<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="MisterSig — Contact. Send a message or connect on social."
    />
    <title>Contact — MisterSig</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body data-page="contact">
    <a href="#main" class="skip-link">Skip to main content</a>

    <header role="banner">
      <nav id="site-nav" aria-label="Main navigation"></nav>
    </header>

    <main id="main" tabindex="-1">
      <div class="contact-layout">
        <div class="container">
          <span class="eyebrow" aria-hidden="true">// COMMS</span>
          <h1 class="contact-headline">Start a conversation.</h1>
          <p class="contact-intro">
            Have a project in mind or just want to connect? Send a message and
            I'll get back to you.
          </p>

          <div class="contact-grid">
            <!-- Form injected by initContact() → buildContactForm() -->
            <div id="contact-form-container" aria-label="Contact form"></div>
            <!-- Social / info injected by initContact() → buildContactInfo() -->
            <div id="contact-info-container"></div>
          </div>
        </div>
      </div>
    </main>

    <footer id="site-footer" role="contentinfo">
      <div id="site-footer-inner" class="container"></div>
    </footer>

    <script src="js/data.js"></script>
    <script src="js/components.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
